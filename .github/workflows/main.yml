name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ensure browsers are installed
      run: playwright install --with-deps

    - name: Run tests
      run: pytest
      env:
        # Здесь мы прописываем переменные, которые нужны для запуска.
        # На GitHub их нужно будет добавить в Settings -> Secrets
        CONDUIT_API_URL: ${{ secrets.CONDUIT_API_URL }}
        CONDUIT_UI_URL: ${{ secrets.CONDUIT_UI_URL }}
        USER_EMAIL: ${{ secrets.USER_EMAIL }}
        USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
